name: Daily Slack Briefing

on:
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      KSKILL_PROXY_BASE_URL: ${{ secrets.KSKILL_PROXY_BASE_URL }}
      TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
      BRIEFING_TIMEZONE: Asia/Seoul
      BRIEFING_RUN_ONCE: 'true'
      BRIEFING_LAT: '37.5258'
      BRIEFING_LON: '126.8966'
      BRIEFING_REGION_HINT: 서울 영등포구
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Debug trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          date -u

      - name: Validate required env
        run: |
          test -n "$SLACK_WEBHOOK_URL" || (echo "SLACK_WEBHOOK_URL is missing" && exit 1)
          test -n "$KSKILL_PROXY_BASE_URL" || (echo "KSKILL_PROXY_BASE_URL is missing" && exit 1)
          test -n "$TWELVE_DATA_API_KEY" || (echo "TWELVE_DATA_API_KEY is missing" && exit 1)

      - name: Proxy route health check
        run: |
          set -e
          curl -fsS --get "${KSKILL_PROXY_BASE_URL}/v1/korea-weather/forecast" \
            --data-urlencode "lat=${BRIEFING_LAT}" \
            --data-urlencode "lon=${BRIEFING_LON}" >/tmp/weather.json
          curl -fsS --get "${KSKILL_PROXY_BASE_URL}/v1/fine-dust/report" \
            --data-urlencode "regionHint=${BRIEFING_REGION_HINT}" >/tmp/finedust.json
          head -c 200 /tmp/weather.json || true
          echo
          head -c 200 /tmp/finedust.json || true
          echo

      - name: Send briefing
        run: node index.mjs
