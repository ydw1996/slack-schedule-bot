name: Daily Slack Briefing

on:
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      KSKILL_PROXY_BASE_URL: ${{ secrets.KSKILL_PROXY_BASE_URL }}
      TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
      BRIEFING_TIMEZONE: Asia/Seoul
      BRIEFING_RUN_ONCE: 'true'
      BRIEFING_LAT: '37.5258'
      BRIEFING_LON: '126.8966'
      BRIEFING_REGION_HINT: 서울 영등포구
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Debug trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          date -u

      - name: Validate required env
        run: |
          test -n "$SLACK_WEBHOOK_URL" || (echo "SLACK_WEBHOOK_URL is missing" && exit 1)
          test -n "$KSKILL_PROXY_BASE_URL" || (echo "KSKILL_PROXY_BASE_URL is missing" && exit 1)
          test -n "$TWELVE_DATA_API_KEY" || (echo "TWELVE_DATA_API_KEY is missing" && exit 1)

      - name: Proxy route health check
        continue-on-error: true
        run: |
          set -u

          check_route() {
            local name="$1"
            local outfile="$2"
            shift 2

            local status="000"
            local attempt
            for attempt in 1 2 3; do
              status=$(curl -sS -o "${outfile}" -w "%{http_code}" "$@")
              if [ "${status}" = "200" ]; then
                echo "[OK] ${name} status=${status}"
                head -c 300 "${outfile}" || true
                echo
                return 0
              fi

              echo "[WARN] ${name} attempt=${attempt} status=${status}"
              head -c 300 "${outfile}" || true
              echo
              sleep $((attempt * 2))
            done

            echo "::error::${name} failed after retries (last status=${status})"
            return 1
          }

          weather_ok=0
          finedust_ok=0

          check_route "korea-weather" /tmp/weather.json \
            --get "${KSKILL_PROXY_BASE_URL}/v1/korea-weather/forecast" \
            --data-urlencode "lat=${BRIEFING_LAT}" \
            --data-urlencode "lon=${BRIEFING_LON}" || weather_ok=1

          check_route "fine-dust" /tmp/finedust.json \
            --get "${KSKILL_PROXY_BASE_URL}/v1/fine-dust/report" \
            --data-urlencode "regionHint=${BRIEFING_REGION_HINT}" || finedust_ok=1

          if [ "${weather_ok}" -ne 0 ] || [ "${finedust_ok}" -ne 0 ]; then
            echo "::warning::Proxy health check had failures. Proceeding to Send briefing because fallback logic exists."
            exit 1
          fi

      - name: Send briefing
        run: node index.mjs
