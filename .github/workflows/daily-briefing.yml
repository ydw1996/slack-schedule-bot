name: Daily Slack Briefing

on:
  schedule:
    - cron: '30 22 * * *' # 07:30 KST
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      KSKILL_PROXY_BASE_URL: https://k-skill-proxy.nomadamas.org
      BRIEFING_TIMEZONE: Asia/Seoul
      BRIEFING_RUN_ONCE: 'true'
      BRIEFING_LAT: '37.5258'
      BRIEFING_LON: '126.8966'
      BRIEFING_REGION_HINT: 서울 영등포구
      BRIEFING_WEATHER_TARGET_TIME: '0800'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send briefing
        run: node index.mjs
